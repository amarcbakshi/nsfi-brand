<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>Card — Card Component</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);}
  .card{padding:20px 24px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .c{background:#fff;border:1px solid var(--border-3);border-radius:4px;box-shadow:0 1px 0 rgba(0,0,0,.05),0 12px 32px -8px rgba(0,0,0,.10);overflow:hidden;display:flex;flex-direction:column;}
  .img{height:90px;background:#1A1A1A;display:flex;align-items:center;justify-content:center;font-family:"TINY5x3",monospace;font-size:11px;letter-spacing:.08em;color:#A7CC2E;text-transform:uppercase;}
  .body{padding:14px;display:flex;flex-direction:column;gap:6px;}
  .eye{font-family:"TINY5x3",monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);}
  .ttl{font-family:"UN-11ST",sans-serif;font-weight:700;font-size:18px;line-height:1.2;color:#000;}
  .desc{font-size:12px;line-height:1.45;color:var(--fg-3);}
</style></head>
<body class="nsfi">
<div class="card">
  <div class="c"><div class="img">[ chair-circle.jpg ]</div><div class="body"><div class="eye">‡PRINCIPLES</div><div class="ttl">Conversations as Worlds</div><div class="desc">Immersive environments create temporary worlds.</div></div></div>
  <div class="c"><div class="img" style="background:#A7CC2E;color:#000">[ AI-seance.jpg ]</div><div class="body"><div class="eye">‡PRINCIPLES</div><div class="ttl">AI as Collective Mirror</div><div class="desc">A site for collective meaning-making.</div></div></div>
</div>
</body></html>

<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>Card — Vertical Codings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;}
  .card{padding:20px 24px;display:flex;flex-direction:column;gap:10px;}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
  .v{display:flex;flex-direction:column;gap:4px;align-items:flex-start;}
  .tile{width:100%;height:60px;display:flex;align-items:center;justify-content:center;color:#000;font-family:"TINY5x3",monospace;font-size:14px;letter-spacing:.06em;}
  .glyph{font-family:"UN-11ST",sans-serif;font-weight:700;font-size:22px;}
  .name{font-family:"TINY5x3",monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:#000;}
  .hex{font-family:"TINY5x3",monospace;font-size:9px;color:#84817D;}
</style></head>
<body class="nsfi">
<div class="card">
  <div class="row">
    <div class="v"><div class="tile" style="background:#A6CC2E"><span class="glyph">‡</span></div><div class="name">Principles</div><div class="hex">Infra Green · ‡</div></div>
    <div class="v"><div class="tile" style="background:#FA6537"><span class="glyph">◊</span></div><div class="name">Research</div><div class="hex">Thermal Orange · ◊</div></div>
    <div class="v"><div class="tile" style="background:#9A91FF"><span class="glyph">[]</span></div><div class="name">Prototyping</div><div class="hex">Violet · []</div></div>
    <div class="v"><div class="tile" style="background:#D9DDD4"><span class="glyph">*</span></div><div class="name">Salons</div><div class="hex">Concrete · *</div></div>
    <div class="v"><div class="tile" style="background:#84817D;color:#fff"><span class="glyph" style="color:#fff">~</span></div><div class="name">Format</div><div class="hex">Clay · ~</div></div>
  </div>
</div>
</body></html>

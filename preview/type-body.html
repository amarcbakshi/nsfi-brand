<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>Card — Type Body (UN-11)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;}
  .card{padding:20px 24px;display:flex;flex-direction:column;gap:10px;}
  .row{display:flex;flex-direction:column;gap:4px;}
  .meta{font-family:"TINY5x3",monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:#84817D;}
  .body-lg{font-family:"UN-11ST",sans-serif;font-size:18px;line-height:1.55;color:#1A1A1A;}
  .body{font-family:"UN-11ST",sans-serif;font-size:16px;line-height:1.55;color:#1A1A1A;}
  .small{font-family:"UN-11ST",sans-serif;font-size:14px;line-height:1.5;color:#84817D;}
</style></head>
<body class="nsfi">
<div class="card">
  <div class="row"><div class="meta">UN-11 BODY-LG · 18 / 28</div><div class="body-lg">We convene intimate, cross-disciplinary groups to actively experiment.</div></div>
  <div class="row"><div class="meta">UN-11 BODY · 16 / 25</div><div class="body">Drawing on current research, age-old practice, and creative experimentation.</div></div>
  <div class="row"><div class="meta">UN-11 SMALL · 14 / 21</div><div class="small">Contact hello@newsocialforms.org or visit newsocialforms.org.</div></div>
</div>
</body></html>

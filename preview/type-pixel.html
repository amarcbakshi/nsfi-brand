<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>Card — Marginalia (Tiny)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;}
  .card{padding:20px 24px;display:flex;flex-direction:column;gap:14px;}
  .meta{font-family:"TINY5x3",monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:#84817D;}
  .pixel-l{font-family:"TINY5x3",monospace;font-size:18px;letter-spacing:.06em;text-transform:uppercase;color:#000;}
  .pixel-m{font-family:"TINY5x3",monospace;font-size:14px;letter-spacing:.06em;text-transform:uppercase;color:#000;}
  .pixel-s{font-family:"TINY5x3",monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#000;}
</style></head>
<body class="nsfi">
<div class="card">
  <div><div class="meta">TINY 18 · marginalia heading</div><div class="pixel-l">NSF SALON 00 · CARE SPACES</div></div>
  <div><div class="meta">TINY 14 · footer / header</div><div class="pixel-m">XX/XX/XXXX · 00:00–00:00 · MIT MEDIA LAB</div></div>
  <div><div class="meta">TINY 11 · caption</div><div class="pixel-s">BRAND GUIDELINES V1 · NEW SOCIAL FORMS · 01/2026</div></div>
</div>
</body></html>

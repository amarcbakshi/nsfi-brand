<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>Card — Glyph Tokens</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);}
  .card{padding:24px;display:flex;flex-direction:column;gap:12px;}
  .row{display:flex;gap:18px;align-items:center;justify-content:space-around;}
  .g{font-family:"UN-11ST",sans-serif;font-weight:700;font-size:42px;line-height:1;color:#000;}
  .meta{font-family:"TINY5x3",monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);text-align:center;}
  .item{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .green{background:#A7CC2E;width:60px;height:60px;display:flex;align-items:center;justify-content:center;}
</style></head>
<body class="nsfi">
<div class="card">
  <div class="row">
    <div class="item"><div class="green"><div class="g">✓</div></div><div class="meta">check</div></div>
    <div class="item"><div class="g">🐕</div><div class="meta">dog</div></div>
    <div class="item"><div class="green"><div class="g">$</div></div><div class="meta">dollar</div></div>
    <div class="item"><div class="g">⌣</div><div class="meta">smile</div></div>
    <div class="item"><div class="green"><div class="g">#</div></div><div class="meta">hash</div></div>
    <div class="item"><div class="g">*</div><div class="meta">asterisk</div></div>
    <div class="item"><div class="green"><div class="g">‡</div></div><div class="meta">d.dagger</div></div>
    <div class="item"><div class="g">◊</div><div class="meta">lozenge</div></div>
  </div>
</div>
</body></html>

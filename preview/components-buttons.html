<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>Card — Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);}
  .card{padding:24px;display:flex;flex-wrap:wrap;gap:12px;align-items:center;font-family:var(--font-sans);}
  .btn{font-family:var(--font-sans);font-weight:700;font-size:14px;letter-spacing:.02em;padding:12px 20px;border-radius:999px;border:0;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all .12s cubic-bezier(.22,1,.36,1);}
  .primary{background:#000;color:#fff;}
  .primary:hover{background:#1A1A1A;}
  .accent{background:#A7CC2E;color:#000;}
  .accent:hover{background:#8FB320;}
  .ghost{background:transparent;color:#000;border:2px solid #000;padding:10px 18px;}
  .ghost:hover{background:#000;color:#fff;}
  .sm{font-size:12px;padding:8px 14px;}
  .arrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;}
</style></head>
<body class="nsfi">
<div class="card">
  <button class="btn primary">Join the Salon Series <span class="arrow">→</span></button>
  <button class="btn accent">Register</button>
  <button class="btn ghost">Learn more</button>
  <button class="btn primary sm">Send</button>
  <button class="btn ghost sm">Cancel</button>
</div>
</body></html>

<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>Card — Color Primary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;}
  .card{padding:20px 24px;display:flex;flex-direction:column;gap:14px;}
  .row{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;}
  .sw{display:flex;flex-direction:column;gap:6px;}
  .chip{height:64px;border:1px solid #D9DDD4;}
  .name{font-family:"TINY5x3",monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#000;}
  .hex{font-family:"TINY5x3",monospace;font-size:10px;color:#84817D;}
</style></head>
<body class="nsfi">
<div class="card">
  <div class="row">
    <div class="sw"><div class="chip" style="background:#A6CC2E"></div><div class="name">Infra Green</div><div class="hex">#A6CC2E</div></div>
    <div class="sw"><div class="chip" style="background:#FA6537"></div><div class="name">Thermal Orange</div><div class="hex">#FA6537</div></div>
    <div class="sw"><div class="chip" style="background:#9A91FF"></div><div class="name">Violet</div><div class="hex">#9A91FF</div></div>
    <div class="sw"><div class="chip" style="background:#D9DDD4"></div><div class="name">Concrete</div><div class="hex">#D9DDD4</div></div>
    <div class="sw"><div class="chip" style="background:#84817D"></div><div class="name">Clay</div><div class="hex">#84817D</div></div>
    <div class="sw"><div class="chip" style="background:#000"></div><div class="name">Black</div><div class="hex">#000000</div></div>
    <div class="sw"><div class="chip" style="background:#fff"></div><div class="name">White</div><div class="hex">#FFFFFF</div></div>
  </div>
</div>
</body></html>

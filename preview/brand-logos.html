<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>Card — Brand Logos</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);}
  .card{padding:20px;display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:14px;}
  .tile{background:#fff;border:1px solid var(--border-3);display:flex;align-items:center;justify-content:center;padding:12px;}
  .tile.dark{background:#000;}
  .tile.green{background:#A7CC2E;}
  .tile img{max-width:100%;max-height:80px;object-fit:contain;}
  .meta{font-family:"TINY5x3",monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);text-align:center;margin-top:4px;}
  .col{display:flex;flex-direction:column;}
</style></head>
<body class="nsfi">
<div class="card">
  <div class="col"><div class="tile" style="height:96px"><img src="../Logos/SVG/Wordmark_1-line_black.svg" alt="Wordmark 1-line black"></div><div class="meta">Wordmark · 1-line</div></div>
  <div class="col"><div class="tile" style="height:96px"><img src="../Logos/SVG/Wordmark_Stacked_black.svg" alt="Stacked black"></div><div class="meta">Stacked</div></div>
  <div class="col"><div class="tile green" style="height:96px"><img src="../Logos/SVG/nSFi_MonogramBlack_rev.svg" alt="Monogram on green"></div><div class="meta">Monogram · Avatar</div></div>
</div>
</body></html>

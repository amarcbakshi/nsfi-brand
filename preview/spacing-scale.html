<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>Card — Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-1);}
  .card{padding:20px 24px;display:flex;flex-direction:column;gap:8px;font-family:var(--font-sans);}
  .row{display:flex;align-items:center;gap:10px;}
  .meta{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);min-width:84px;}
  .bar{background:#000;height:14px;}
  .px{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-left:6px;}
</style></head>
<body class="nsfi">
<div class="card">
  <div class="row"><div class="meta">sp-1</div><div class="bar" style="width:4px"></div><div class="px">4</div></div>
  <div class="row"><div class="meta">sp-2</div><div class="bar" style="width:8px"></div><div class="px">8</div></div>
  <div class="row"><div class="meta">sp-3</div><div class="bar" style="width:12px"></div><div class="px">12</div></div>
  <div class="row"><div class="meta">sp-4</div><div class="bar" style="width:16px"></div><div class="px">16</div></div>
  <div class="row"><div class="meta">sp-5</div><div class="bar" style="width:24px"></div><div class="px">24</div></div>
  <div class="row"><div class="meta">sp-6</div><div class="bar" style="width:32px"></div><div class="px">32</div></div>
  <div class="row"><div class="meta">sp-7</div><div class="bar" style="width:48px"></div><div class="px">48</div></div>
  <div class="row"><div class="meta">sp-8</div><div class="bar" style="width:64px"></div><div class="px">64</div></div>
  <div class="row"><div class="meta">sp-9</div><div class="bar" style="width:96px"></div><div class="px">96</div></div>
</div>
</body></html>

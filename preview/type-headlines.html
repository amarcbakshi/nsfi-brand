<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>Card — Type Headlines</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;}
  .card{padding:20px 24px;display:flex;flex-direction:column;gap:14px;}
  .row{display:flex;align-items:baseline;gap:18px;border-bottom:1px solid #D9DDD4;padding-bottom:8px;}
  .row:last-child{border-bottom:0;}
  .meta{font-family:"TINY5x3",monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:#84817D;min-width:140px;}
  .h1{font-family:"TINY5x3",monospace;font-weight:540;font-size:44px;line-height:1.05;color:#000;}
  .h2{font-family:"TINY5x3",monospace;font-weight:400;font-size:32px;line-height:1.1;color:#000;}
  .h3{font-family:"UN-11ST",sans-serif;font-weight:700;font-size:24px;color:#000;}
  .h4{font-family:"UN-11ST",sans-serif;font-weight:700;font-size:20px;color:#000;}
</style></head>
<body class="nsfi">
<div class="card">
  <div class="row"><div class="meta">H1 · TINY 44</div><div class="h1">CARE SPACES</div></div>
  <div class="row"><div class="meta">H2 · TINY 32</div><div class="h2">SALON 00</div></div>
  <div class="row"><div class="meta">H3 · UN-11 24</div><div class="h3">Conversations as Worlds</div></div>
  <div class="row"><div class="meta">H4 · UN-11 20</div><div class="h4">About the Speakers</div></div>
</div>
</body></html>
